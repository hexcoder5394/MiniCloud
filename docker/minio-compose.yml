version: '3.8'

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio-vault
    # Changed from :9001 to :9002 to avoid Portainer Agent conflict
    command: server /data --console-address ":9002"
    environment:
      - MINIO_ROOT_USER=mcadmin   
      - MINIO_ROOT_PASSWORD=1@OlewiSh
    ports:
      - "9000:9000" # The S3 API Port (What Duplicati talks to)
      - "9002:9002" # The Web Console Port (Changed to 9002)
    volumes:
      - vault_data:/data
    restart: unless-stopped

volumes:
  vault_data: